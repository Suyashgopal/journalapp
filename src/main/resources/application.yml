# =============================================================================
# Application configuration.
#
# Contains NO literal secrets — every sensitive value is read from an environment
# variable, with a safe local-dev default after the ":" so the app boots out of
# the box for development. In production, set these env vars to real values:
#
#   MONGODB_URI, REDIS_URI, JWT_SECRET, WEATHER_API_KEY,
#   MAIL_USERNAME, MAIL_PASSWORD,
#   KAFKA_BOOTSTRAP_SERVERS, KAFKA_USERNAME, KAFKA_PASSWORD
#
# IMPORTANT: the credentials previously committed here are compromised and must be
# rotated (Mongo Atlas, Redis, Kafka, Gmail app password, Weatherstack, JWT secret).
# Externalizing them does not remove them from git history.
# =============================================================================

spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

    consumer:
      group-id: weekly-sentiment-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        spring:
          json:
            trusted:
              packages: com.springproj.journalApp.model

    properties:
      security:
        protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      sasl:
        mechanism: ${KAFKA_SASL_MECHANISM:PLAIN}
        jaas:
          config: >
            org.apache.kafka.common.security.plain.PlainLoginModule required
            username= ${KAFKA_USERNAME:}
            password= ${KAFKA_PASSWORD:}
      session:
        timeout:
          ms: 45000

  redis:
    uri: ${REDIS_URI:redis://localhost:6379}

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/journaldb}
      database: ${MONGODB_DATABASE:journaldb}
      auto-index-creation: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8081
  servlet:
    context-path: /journal

logging:
  level:
    com:
      springproj:
        journalApp: DEBUG

jwt:
  # Dev-only default. MUST be overridden via JWT_SECRET in any real environment.
  secret: ${JWT_SECRET:dev-only-insecure-secret-please-override-32b}

weather:
  api:
    key: ${WEATHER_API_KEY:}
